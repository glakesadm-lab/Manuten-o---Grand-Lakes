<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Painel Manutenção — Grand Lakes</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand:#1B3A8C;--brand-dark:#122970;--brand-light:#E8EDF8;
  --amber:#BA7517;--amber-bg:#FAEEDA;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --gbg:#F5F5F3;--gborder:#E0DED8;--gmuted:#6B6A66;
  --text:#1A1A18;--r:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--gbg);color:var(--text);min-height:100vh;}
.topbar{background:var(--brand);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tl{display:flex;align-items:center;gap:12px;}
.tl img{height:30px;}
.tdiv{width:1px;height:24px;background:rgba(255,255,255,0.3);}
.tl h1{font-size:15px;font-weight:600;color:white;}
.tl p{font-size:11px;color:rgba(255,255,255,0.65);margin-top:2px;}
.tr{display:flex;align-items:center;gap:10px;}
.uat{font-size:11px;color:rgba(255,255,255,0.6);}
.btnref{padding:6px 14px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:7px;color:white;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;}
.btnref:hover{background:rgba(255,255,255,0.22);}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{animation:spin 0.7s linear infinite;}
.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:240px;min-width:240px;background:white;border-right:1px solid var(--gborder);padding:16px;overflow-y:auto;}
.main{flex:1;padding:20px 24px;overflow-x:hidden;}
@media(max-width:768px){.layout{flex-direction:column;}.sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--gborder);padding:12px;}.main{padding:14px;}}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.kpi{background:var(--gbg);border-radius:8px;padding:10px;text-align:center;}
.knum{font-size:22px;font-weight:700;}
.klbl{font-size:11px;color:var(--gmuted);margin-top:2px;}
.kab .knum{color:var(--red);}
.kan .knum{color:var(--blue);}
.kco .knum{color:var(--brand);}
.kt  .knum{color:var(--text);}
.stitle{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--gmuted);margin:14px 0 6px;}
.stitle:first-child{margin-top:0;}
.fbtn{width:100%;padding:7px 10px;border:none;border-radius:7px;background:transparent;text-align:left;font-size:13px;font-weight:500;cursor:pointer;color:var(--gmuted);display:flex;align-items:center;justify-content:space-between;}
.fbtn:hover{background:var(--gbg);color:var(--text);}
.fbtn.act{background:var(--brand-light);color:var(--brand-dark);}
.fbadge{font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px;background:rgba(0,0,0,0.07);}
.selres{width:100%;padding:7px 10px;border:1px solid var(--gborder);border-radius:7px;font-size:13px;background:white;color:var(--text);margin-top:4px;}
.lhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.lhdr h2{font-size:17px;font-weight:600;}
.srch{padding:8px 12px;border:1.5px solid var(--gborder);border-radius:8px;font-size:14px;background:white;color:var(--text);width:200px;}
.srch:focus{outline:none;border-color:var(--brand);}
.card{background:white;border:1px solid var(--gborder);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.ctop{padding:13px 15px 11px;}
.crow1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:7px;}
.cidtag{font-family:monospace;font-size:12px;background:var(--gbg);color:var(--gmuted);padding:2px 8px;border-radius:5px;font-weight:600;}
.bdgs{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.bdg{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.bab{background:var(--red-bg);color:var(--red);}
.ban{background:var(--blue-bg);color:var(--blue);}
.bag{background:var(--amber-bg);color:var(--amber);}
.bco{background:#EAF3DE;color:#3B6D11;}
.bca{background:#F1EFE8;color:#5F5E5A;}
.bpa{background:#FCEBEB;color:#791F1F;}
.bpm{background:var(--amber-bg);color:#854F0B;}
.bpb{background:var(--brand-light);color:var(--brand-dark);}
.cnome{font-size:15px;font-weight:600;margin-bottom:3px;}
.cinfo{font-size:13px;color:var(--gmuted);display:flex;gap:10px;flex-wrap:wrap;}
.cdesc{font-size:13px;color:var(--gmuted);margin-top:7px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cmeta{display:flex;align-items:center;justify-content:space-between;padding:7px 15px;background:var(--gbg);border-top:1px solid var(--gborder);font-size:12px;flex-wrap:wrap;gap:6px;}
.timer{display:flex;align-items:center;gap:4px;font-weight:600;font-size:12px;}
.turg{color:var(--red);}
.tal{color:var(--amber);}
.tok{color:var(--brand);}
.slabar{height:3px;background:var(--gborder);border-radius:2px;margin-top:5px;overflow:hidden;width:140px;}
.slafill{height:100%;border-radius:2px;}
.slafill.tok{background:var(--brand);}
.slafill.tal{background:var(--amber);}
.slafill.turg{background:var(--red);}
.flink{font-size:12px;color:var(--blue);text-decoration:none;display:flex;align-items:center;gap:3px;}
.flink:hover{text-decoration:underline;}
.cacao{padding:13px 15px;border-top:1px solid var(--gborder);display:none;background:#FAFAF8;}
.cacao.open{display:block;}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.af label{display:block;font-size:12px;font-weight:500;color:var(--gmuted);margin-bottom:5px;}
.af input,.af textarea,.af select{width:100%;padding:8px 11px;border:1.5px solid var(--gborder);border-radius:7px;font-size:13px;background:white;color:var(--text);font-family:inherit;}
.af textarea{resize:vertical;min-height:65px;}
.af input:focus,.af textarea:focus,.af select:focus{outline:none;border-color:var(--brand);}
.aful{grid-column:1/-1;}
.abtns{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;}
.bst{flex:1;min-width:110px;padding:8px 10px;border:1.5px solid;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;}
.ban2{border-color:var(--blue);color:var(--blue);background:white;}
.ban2:hover{background:var(--blue-bg);}
.bag2{border-color:var(--amber);color:#854F0B;background:white;}
.bag2:hover{background:var(--amber-bg);}
.bco2{border-color:var(--brand);color:var(--brand-dark);background:white;}
.bco2:hover{background:var(--brand-light);}
.bca2{border-color:var(--gborder);color:var(--gmuted);background:white;}
.bca2:hover{background:var(--gbg);}
.btog{padding:5px 11px;border:1px solid var(--gborder);border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;background:white;color:var(--gmuted);}
.btog:hover{background:var(--gbg);}
.loading{text-align:center;padding:48px;color:var(--gmuted);}
.ldspin{width:34px;height:34px;border:3px solid var(--gborder);border-top-color:var(--brand);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
.empty{text-align:center;padding:48px;color:var(--gmuted);font-size:14px;line-height:1.7;}
.errtop{background:var(--red-bg);color:var(--red);padding:10px 16px;font-size:13px;border-radius:8px;margin-bottom:14px;display:none;}
</style>
</head>

<div class="layout">
  <aside class="sidebar">
    <div class="kgrid">
      <div class="kpi kab"><div class="knum" id="kab">—</div><div class="klbl">Abertos</div></div>
      <div class="kpi kan"><div class="knum" id="kan">—</div><div class="klbl">Andamento</div></div>
      <div class="kpi kco"><div class="knum" id="kco">—</div><div class="klbl">Concluídos</div></div>
      <div class="kpi kt" ><div class="knum" id="kt" >—</div><div class="klbl">Total</div></div>

    <div class="stitle">Status</div>
    <button class="fbtn act" onclick="fst('todos',this)">Todos <span class="fbadge" id="fbt">—</span></button>
    <button class="fbtn" onclick="fst('Aberto',this)">Abertos <span class="fbadge" id="fba">—</span></button>
    <button class="fbtn" onclick="fst('Em Andamento',this)">Em andamento <span class="fbadge" id="fban">—</span></button>
    <button class="fbtn" onclick="fst('Aguardando Material',this)">Aguardando material <span class="fbadge" id="fbag">—</span></button>
    <button class="fbtn" onclick="fst('Concluído',this)">Concluídos <span class="fbadge" id="fbco">—</span></button>
    <div class="stitle">Prioridade</div>
    <button class="fbtn" onclick="fpr('todos',this)">Todas</button>
    <button class="fbtn" onclick="fpr('Alta',this)">🔴 Alta</button>
    <button class="fbtn" onclick="fpr('Media',this)">🟡 Média</button>
    <button class="fbtn" onclick="fpr('Baixa',this)">🟢 Baixa</button>
    <div class="stitle">Residência</div>
    <select class="selres" id="selres" onchange="fres(this.value)">
      <option value="todas">Todas</option>
    </select>
  </aside>
  <main class="main">
    <div class="lhdr">
      <h2 id="ltit">Carregando...</h2>
      <input type="text" class="srch" placeholder="Buscar nome, ID..." oninput="buscar(this.value)"/>
    </div>
    <div class="errtop" id="errtop"></div>
    <div id="lista"><div class="loading"><div class="ldspin"></div>Carregando chamados...</div></div>
  </main>
</div>

<script>
var URL = "https://script.google.com/macros/s/AKfycbyZ8qnnd1mWNpZEgQEVWqRlvolFA0KKzQ0QOzCQRmNS04H78uOmhuv5cGIpt38a4KhdKQ/exec";
var todos = [];
var fStatus = "todos";
var fPrio   = "todos";
var fRes    = "todas";
var fBusca  = "";
var abertos = {};

(function(){
  var s = document.getElementById("selres");
  for(var i=1;i<=50;i++){
    var o = document.createElement("option");
    var n = i < 10 ? "0"+i : ""+i;
    o.value = "Casa "+n;
    o.textContent = "Casa "+n;
    s.appendChild(o);
  }
})();

function load(){
  var ri = document.getElementById("ri");
  ri.classList.add("spin");
  fetch(URL+"?acao=listarChamados&t="+Date.now())
    .then(function(r){ return r.text(); })
    .then(function(t){
      var d = JSON.parse(t);
      if(!d.ok) throw new Error(d.erro||"erro");
      todos = d.chamados||[];
      kpis();
      render();
      document.getElementById("uat").textContent =
        "Atualizado: "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
      document.getElementById("errtop").style.display="none";
    })
    .catch(function(e){
      var el = document.getElementById("errtop");
      el.textContent = "Erro: "+e.message;
      el.style.display = "block";
      document.getElementById("lista").innerHTML =
        "<div class='empty'>Não foi possível carregar.<br>Verifique se reimplantou o Apps Script com nova versão.</div>";
    })
    .finally(function(){ setTimeout(function(){ ri.classList.remove("spin"); },500); });
}

function kpis(){
  var ab=0,an=0,ag=0,co=0;
  todos.forEach(function(c){
    if(c.status==="Aberto")              ab++;
    else if(c.status==="Em Andamento")   an++;
    else if(c.status==="Aguardando Material") ag++;
    else if(c.status==="Concluído")      co++;
  });
  document.getElementById("kab").textContent=ab;
  document.getElementById("kan").textContent=an;
  document.getElementById("kco").textContent=co;
  document.getElementById("kt").textContent=todos.length;
  document.getElementById("fbt").textContent=todos.length;
  document.getElementById("fba").textContent=ab;
  document.getElementById("fban").textContent=an;
  document.getElementById("fbag").textContent=ag;
  document.getElementById("fbco").textContent=co;
}

function fst(s,el){
  fStatus=s;
  document.querySelectorAll(".fbtn").forEach(function(b){b.classList.remove("act");});
  el.classList.add("act");
  render();
}
function fpr(p){fPrio=p;render();}
function fres(v){fRes=v;render();}
function buscar(v){fBusca=v.toLowerCase();render();}

function render(){
  var lista = todos.filter(function(c){
    if(fStatus!=="todos" && c.status!==fStatus) return false;
    if(fPrio!=="todos"   && c.prioridade!==fPrio) return false;
    if(fRes!=="todas"    && c.residencia!==fRes) return false;
    if(fBusca && (c.id+c.nome+c.residencia+c.descricao).toLowerCase().indexOf(fBusca)<0) return false;
    return true;
  });
  var tit = fStatus==="todos" ? "Todos os chamados" : fStatus;
  document.getElementById("ltit").textContent = tit+" ("+lista.length+")";
  if(lista.length===0){
    document.getElementById("lista").innerHTML="<div class='empty'>Nenhum chamado encontrado.</div>";
    return;
  }
  var html = "";
  lista.forEach(function(c){ html += card(c); });
  document.getElementById("lista").innerHTML = html;
}

function fmt(m){
  m = parseInt(m)||0;
  if(m<1)    return "< 1 min";
  if(m<60)   return m+" min";
  if(m<1440) return Math.floor(m/60)+"h "+Math.round(m%60)+"min";
  return Math.floor(m/1440)+"d "+Math.floor((m%1440)/60)+"h";
}

function card(c){
  var slaMap = {Alta:240,Media:1440,Baixa:4320};
  var slaMin = slaMap[c.prioridade]||1440;
  var min    = parseInt(c.tempoDecorridoMin)||0;
  var perc   = Math.min(100,Math.round((min/slaMin)*100));
  var sc     = perc>=90?"turg":perc>=60?"tal":"tok";
  var sCls   = {Aberto:"bab","Em Andamento":"ban","Aguardando Material":"bag","Concluido":"bco","Cancelado":"bca"}[c.status]||"bab";
  if(c.status==="Concluido"||c.status==="Concluído") sCls="bco";
  var pCls   = {Alta:"bpa",Media:"bpm",Baixa:"bpb"}[c.prioridade]||"bpm";
  var pLbl   = c.prioridade==="Media"?"Média":c.prioridade;
  var tStr   = c.status==="Concluído"||c.status==="Concluido"
    ? "Concluído em "+(c.tempoTotal||"—")+" min"
    : "Aberto há "+fmt(min);
  var slaHtml = (c.status==="Concluído"||c.status==="Concluido")
    ? (c.slaCumprido==="Sim"
        ? "<span style='font-size:11px;color:#3B6D11'>&#10003; SLA OK</span>"
        : "<span style='font-size:11px;color:#A32D2D'>&#10007; SLA excedido</span>")
    : "<div class='slabar'><div class='slafill "+sc+"' style='width:"+perc+"%'></div></div>"
      +"<div style='font-size:10px;color:#6B6A66;margin-top:2px'>"+perc+"% SLA ("+slaMin+"min)</div>";
  var fotoHtml = c.linkFoto
    ? "<a href="+JSON.stringify(c.linkFoto)+" target='_blank' class='flink'>&#128247; Foto</a>"
    : "";
  var podeAtender = c.status!=="Concluído" && c.status!=="Concluido" && c.status!=="Cancelado";
  var acAberta    = !!abertos[c.id];
  var acHtml = "";
  if(podeAtender && acAberta){
    var selOpts = ["Em Andamento","Aguardando Material","Concluído","Cancelado"].map(function(s){
      return "<option value="+JSON.stringify(s)+(c.status===s?" selected":"")+">"+s+"</option>";
    }).join("");
    acHtml = "<div class='cacao open' id='ac"+c.id+"'>"
      +"<div class='agrid'>"
      +"<div class='af'><label>Responsável</label>"
      +"<input type='text' id='rsp"+c.id+"' placeholder='Nome do técnico' value="+JSON.stringify(c.responsavel||"")+"/></div>"
      +"<div class='af'><label>Novo status</label><select id='sts"+c.id+"'>"+selOpts+"</select></div>"
      +"<div class='af aful'><label>Observação técnica</label>"
      +"<textarea id='obs"+c.id+"' placeholder='Descreva o que foi feito...'>"+( c.observacao||"")+"</textarea></div>"
      +"</div>"
      +"<div class='abtns'>"
      +"<button class='bst ban2' data-id="+JSON.stringify(c.id)+" data-st='Em Andamento'>Em andamento</button>"
      +"<button class='bst bag2' data-id="+JSON.stringify(c.id)+" data-st='Aguardando Material'>Aguardando material</button>"
      +"<button class='bst bco2' data-id="+JSON.stringify(c.id)+" data-st='Concluído'>Concluir</button>"
      +"<button class='bst bca2' data-id="+JSON.stringify(c.id)+" data-st='Cancelado'>Cancelar</button>"
      +"</div></div>";
  }
  var togBtn = podeAtender
    ? "<button class='btog' data-tog="+JSON.stringify(c.id)+">"+(acAberta?"&#9650; Fechar":"&#9660; Atender")+"</button>"
    : "";
  return "<div class='card' id='crd"+c.id+"'>"
    +"<div class='ctop'>"
    +"<div class='crow1'>"
    +"<span class='cidtag'>"+c.id+"</span>"
    +"<div class='bdgs'><span class='bdg "+pCls+"'>"+pLbl+"</span><span class='bdg "+sCls+"'>"+c.status+"</span></div>"
    +"</div>"
    +"<div class='cnome'>"+c.nome+"</div>"
    +"<div class='cinfo'><span>&#127968; "+c.residencia+"</span><span>&#128295; "+c.categoria+"</span><span>&#128197; "+c.dataAbertura+"</span></div>"
    +"<div class='cdesc'>"+c.descricao+"</div>"
    +"</div>"
    +"<div class='cmeta'>"
    +"<div><div class='timer "+sc+"'>"
    +"<svg width='11' height='11' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5'>"
    +"<circle cx='12' cy='12' r='10'/><polyline points='12 6 12 12 16 14'/></svg> "
    +tStr+"</div>"+slaHtml+"</div>"
    +"<div style='display:flex;gap:7px;align-items:center'>"+fotoHtml+togBtn+"</div>"
    +"</div>"
    +acHtml
    +"</div>";
}

function tog(id){
  abertos[id] = !abertos[id];
  render();
  setTimeout(function(){
    var el = document.getElementById("crd"+id);
    if(el) el.scrollIntoView({behavior:"smooth",block:"nearest"});
  },50);
}

function atualizar(id,status){
  var rsp = document.getElementById("rsp"+id);
  var obs = document.getElementById("obs"+id);
  var r   = rsp ? rsp.value.trim() : "";
  var o   = obs ? obs.value.trim() : "";
  if(status==="Concluído" && !r){ alert("Informe o responsável antes de concluir."); return; }
  var payload = {acao:"atualizarStatus",id:id,status:status,responsavel:r,observacao:o};
  fetch(URL,{method:"POST",body:JSON.stringify(payload)})
    .then(function(r){ return r.text(); })
    .then(function(t){
      var d = JSON.parse(t);
      if(!d.ok) throw new Error(d.erro||"erro");
      delete abertos[id];
      load();
    })
    .catch(function(e){ alert("Erro ao atualizar: "+e.message); });
}

// Delegação de eventos — trata cliques nos botões gerados dinamicamente
document.addEventListener("click", function(e){
  var bt = e.target.closest("[data-tog]");
  if(bt){ tog(bt.getAttribute("data-tog")); return; }
  var bs = e.target.closest("[data-st]");
  if(bs){ atualizar(bs.getAttribute("data-id"), bs.getAttribute("data-st")); return; }
});
load();
setInterval(load, 120000);
</script>
</body>
</html>
